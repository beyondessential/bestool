name: Release algae-cli

on:
  push:
    tags:
      - "algae-cli-v*"

env:
  CARGO_TERM_COLOR: always
  CARGO_UNSTABLE_SPARSE_REGISTRY: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: read
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-15
          # Linux releases are static musl binaries, so one build per arch
          # runs on any distro and glibc era.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
            gnutarget: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            gnutarget: aarch64-unknown-linux-gnu
          - target: x86_64-pc-windows-msvc
            os: windows-2022

    name: Build / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Configure toolchain
        run: |
          rustup toolchain install --profile minimal --no-self-update stable
          rustup target add ${{ matrix.target }}
          rustup default stable

      # https://github.com/actions/cache/issues/752
      - if: runner.os == 'Windows'
        name: Use GNU tar
        shell: cmd
        run: |
          echo "Adding GNU tar to PATH"
          echo C:\Program Files\Git\usr\bin>>"%GITHUB_PATH%"

      - if: runner.os == 'Windows'
        name: Statically link crt
        shell: bash
        run: |
          echo 'RUSTFLAGS=-Ctarget-feature=+crt-static' >> "$GITHUB_ENV"

      - if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl musl-dev musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: algae-${{ matrix.target }}
          # Release builds run on one-shot tags; don't persist tag-scoped
          # caches PRs can't reuse and that crowd out CI's under the 10 GB cap.
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@v2.82.2
        with:
          tool: cargo-auditable

      - run: cargo auditable build --profile dist --target ${{ matrix.target }} -p algae-cli

      - uses: actions/attest-build-provenance@v4.1.0
        if: runner.os != 'Windows'
        with:
          subject-path: target/*/dist/algae
      - uses: actions/attest-build-provenance@v4.1.0
        if: runner.os == 'Windows'
        with:
          subject-path: target/*/dist/algae.exe

      - name: Extract version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#algae-cli-v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package DEB
        if: contains(matrix.target, 'linux-musl')
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          target="${{ matrix.target }}"
          arch=""
          if [[ "$target" == "x86_64-unknown-linux-musl" ]]; then
            arch="amd64"
          elif [[ "$target" == "aarch64-unknown-linux-musl" ]]; then
            arch="arm64"
          fi

          deb_dir="target/deb-algae"
          mkdir -p "$deb_dir/DEBIAN"
          install -Dm755 "target/$target/dist/algae" "$deb_dir/usr/bin/algae"

          install -Dm644 COPYING "$deb_dir/usr/share/doc/algae/copyright"
          install -Dm644 crates/algae-cli/README.md "$deb_dir/usr/share/doc/algae/README.md"
          install -Dm644 crates/algae-cli/USAGE.md "$deb_dir/usr/share/doc/algae/USAGE.md"

          cat > "$deb_dir/DEBIAN/control" << EOF
          Package: algae
          Version: $version
          Section: utils
          Priority: optional
          Architecture: $arch
          Maintainer: BES Developers <support@bes.au>
          Description: Lightweight age profile for user-friendly encryption
          Homepage: https://github.com/beyondessential/bestool
          License: GPL-3.0-or-later
          EOF

          dpkg-deb --build --root-owner-group "$deb_dir" "algae-${target}-${version}.deb"

      - uses: actions/upload-artifact@v7
        with:
          name: algae-${{ matrix.target }}-${{ github.sha }}
          if-no-files-found: error
          retention-days: 7
          path: |
            target/*/dist/algae
            target/*/dist/algae.exe
            *.deb

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-region: ap-southeast-2
          role-to-assume: arn:aws:iam::143295493206:role/gha-tamanu-tools-upload
          role-session-name: GHA@algae=Build

      - name: Upload versioned to S3
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          src="target/${{ matrix.target }}/dist/algae"
          dest="s3://bes-ops-tools/algae/${version}/${{ matrix.target }}/"
          if [[ ${{ runner.os }} == "Windows" ]]; then
            aws s3 cp "$src".exe "$dest" --no-progress
          else
            aws s3 cp "$src" "$dest" --no-progress
          fi

          # Also publish under the gnu target path so consumers of the old
          # gnu builds keep working while they move to the musl paths.
          if [[ -n "${{ matrix.gnutarget }}" ]]; then
            aws s3 cp "$src" "s3://bes-ops-tools/algae/${version}/${{ matrix.gnutarget }}/" --no-progress
          fi

          for deb in algae-*.deb; do
            [[ -f "$deb" ]] || continue
            aws s3 cp "$deb" "s3://bes-ops-tools/algae/${version}/" --no-progress
          done

          aws cloudfront create-invalidation --distribution-id=EDAG0UBS1MN74 --paths "/algae/${version}/*"

      - name: Upload latest to S3
        shell: bash
        run: |
          src="target/${{ matrix.target }}/dist/algae"
          dest="s3://bes-ops-tools/algae/latest/${{ matrix.target }}/"
          if [[ ${{ runner.os }} == "Windows" ]]; then
            aws s3 cp "$src".exe "$dest" --no-progress
          else
            aws s3 cp "$src" "$dest" --no-progress
          fi

          if [[ -n "${{ matrix.gnutarget }}" ]]; then
            aws s3 cp "$src" "s3://bes-ops-tools/algae/latest/${{ matrix.gnutarget }}/" --no-progress
          fi

          aws cloudfront create-invalidation --distribution-id=EDAG0UBS1MN74 --paths '/algae/latest/*'

      - name: Upload version file
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          echo -n "$version" > latest-version.txt
          aws s3 cp latest-version.txt s3://bes-ops-tools/algae/latest-version.txt --no-progress
          aws cloudfront create-invalidation --distribution-id=EDAG0UBS1MN74 --paths '/algae/latest-version.txt'
