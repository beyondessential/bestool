name: Release bestool

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  CARGO_UNSTABLE_SPARSE_REGISTRY: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: read
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-15
          # Linux releases are static musl binaries with the iti features
          # included, so one build per arch runs on any distro and glibc era.
          # gnutarget: the linux-gnu target path the artifacts are also
          # uploaded under, so consumers of the old gnu builds (deployed
          # binaries self-updating, pinned URLs) keep working while the fleet
          # rolls over to musl; remove once that's done.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
            gnutarget: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            gnutarget: aarch64-unknown-linux-gnu
          - target: x86_64-pc-windows-msvc
            os: windows-2022

    name: Build / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Configure toolchain
        run: |
          rustup toolchain install --profile minimal --no-self-update stable
          rustup target add ${{ matrix.target }}
          rustup default stable

      # https://github.com/actions/cache/issues/752
      - if: runner.os == 'Windows'
        name: Use GNU tar
        shell: cmd
        run: |
          echo "Adding GNU tar to PATH"
          echo C:\Program Files\Git\usr\bin>>"%GITHUB_PATH%"

      # Avoids depending on vcruntime*.dll, which is not present in e.g. nanoserver
      - if: runner.os == 'Windows'
        name: Statically link crt
        shell: bash
        run: |
          echo 'RUSTFLAGS=-Ctarget-feature=+crt-static' >> "$GITHUB_ENV"

      - if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl musl-dev musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: bestool-${{ matrix.target }}
          # Release builds run on one-shot tags; don't persist tag-scoped
          # caches PRs can't reuse and that crowd out CI's under the 10 GB cap.
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@v2.82.2
        with:
          tool: cargo-auditable,rsign2

      - if: runner.os == 'Linux'
        run: cargo auditable build --profile dist --target ${{ matrix.target }} -p bestool --features iti
      - if: runner.os != 'Linux'
        run: cargo auditable build --profile dist --target ${{ matrix.target }} -p bestool

      - uses: actions/attest-build-provenance@v4.1.0
        if: runner.os != 'Windows'
        with:
          subject-path: target/*/dist/bestool
      - uses: actions/attest-build-provenance@v4.1.0
        if: runner.os == 'Windows'
        with:
          subject-path: target/*/dist/bestool.exe

      - name: Extract version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package DEB
        if: contains(matrix.target, 'linux-musl')
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          target="${{ matrix.target }}"
          arch=""
          if [[ "$target" == "x86_64-unknown-linux-musl" ]]; then
            arch="amd64"
          elif [[ "$target" == "aarch64-unknown-linux-musl" ]]; then
            arch="arm64"
          fi

          deb_dir="target/deb"
          mkdir -p "$deb_dir/DEBIAN"
          install -Dm755 "target/$target/dist/bestool" "$deb_dir/usr/bin/bestool"

          # Shell completion registration stubs. Completions are dynamic: the
          # binary emits the actual completer when invoked with COMPLETE=<shell>,
          # so each shell only needs a one-line stub to hook it up.
          mkdir -p "$deb_dir/usr/share/bash-completion/completions"
          mkdir -p "$deb_dir/usr/share/fish/vendor_completions.d"
          mkdir -p "$deb_dir/usr/share/zsh/vendor-completions"

          echo 'source <(COMPLETE=bash bestool)' > "$deb_dir/usr/share/bash-completion/completions/bestool"
          echo 'source (COMPLETE=fish bestool | psub)' > "$deb_dir/usr/share/fish/vendor_completions.d/bestool.fish"
          echo 'source <(COMPLETE=zsh bestool)' > "$deb_dir/usr/share/zsh/vendor-completions/_bestool"

          # Install license/copyright and documentation
          install -Dm644 COPYING "$deb_dir/usr/share/doc/bestool/copyright"
          install -Dm644 crates/bestool/USAGE.md "$deb_dir/usr/share/doc/bestool/USAGE.md"
          install -Dm644 crates/psql/EXAMPLES.md "$deb_dir/usr/share/doc/bestool/PSQL-EXAMPLES.md"

          # State directory for the canopy registration, and the backup-definition
          # directory alertd watches (shipping it lets the watcher attach on hosts
          # with no backups configured yet, instead of falling back to the timer).
          install -dm755 "$deb_dir/etc/bestool"
          install -dm755 "$deb_dir/etc/bestool/backups"

          # bestool-alertd systemd unit. Shipped disabled: the bestool package
          # is installed broadly as a general CLI, so the unit must not start on
          # every host. Deployment (ansible) enables it and drops a
          # bestool-alertd.service.d/*.conf override with the host-specific
          # TAMANU_DATABASE_URL where alertd should actually run.
          install -Dm644 services/bestool-alertd.service \
            "$deb_dir/usr/lib/systemd/system/bestool-alertd.service"

          # daemon-reload after install/upgrade/removal so systemd picks up unit
          # changes. The unit ships disabled, so nothing is enabled or started.
          cat > "$deb_dir/DEBIAN/postinst" << 'EOF'
          #!/bin/sh
          set -e
          if [ -d /run/systemd/system ]; then
            systemctl daemon-reload || true
          fi
          EOF
          chmod 755 "$deb_dir/DEBIAN/postinst"

          cat > "$deb_dir/DEBIAN/postrm" << 'EOF'
          #!/bin/sh
          set -e
          if [ -d /run/systemd/system ]; then
            systemctl daemon-reload || true
          fi
          EOF
          chmod 755 "$deb_dir/DEBIAN/postrm"

          cat > "$deb_dir/DEBIAN/control" << EOF
          Package: bestool
          Version: $version
          Section: utils
          Priority: optional
          Architecture: $arch
          Depends: bindfs, btrfs-progs, kopia, sudo
          Recommends: lvm2
          Maintainer: BES Developers <support@bes.au>
          Description: BES Deployment tooling
          Homepage: https://github.com/beyondessential/bestool
          License: GPL-3.0-or-later
          EOF

          dpkg-deb --build --root-owner-group "$deb_dir" "bestool-${target}-${version}.deb"

      - name: Ensure zstd is available
        shell: bash
        run: |
          if command -v zstd >/dev/null 2>&1; then
            zstd --version
            exit 0
          fi
          case "${{ runner.os }}" in
            Linux)   sudo apt-get update && sudo apt-get install -y zstd ;;
            macOS)   brew install zstd ;;
            Windows) choco install zstandard -y --no-progress ;;
          esac

      - name: Compress binary with zstd
        shell: bash
        run: |
          src_dir="target/${{ matrix.target }}/dist"
          name="bestool"
          if [[ ${{ runner.os }} == "Windows" ]]; then
            name="bestool.exe"
          fi
          tar -C "$src_dir" -cf - "$name" | zstd -19 -f -o "$src_dir/$name.tar.zst"

      # Sign the compressed artifact (what binstall downloads and what
      # self-update verifies). The detached signature is published alongside it
      # as <artifact>.minisig. Assumes SIGNING_KEY is an unencrypted minisign
      # secret key (the -W automation path); a password-protected key would need
      # its password supplied here instead.
      - name: Sign release artifact
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          src_dir="target/${{ matrix.target }}/dist"
          name="bestool"
          if [[ ${{ runner.os }} == "Windows" ]]; then
            name="bestool.exe"
          fi
          printf '%s\n' "$SIGNING_KEY" > signing.key
          rsign sign -W -s signing.key \
            -x "$src_dir/$name.tar.zst.minisig" \
            "$src_dir/$name.tar.zst"
          rm -f signing.key

      # Guard against the signing key drifting from the public key baked into
      # the binary: verify the just-signed artifact against the exact key the
      # self-update path trusts (RELEASE_PUBLIC_KEY in download.rs). If they
      # don't match, no shipped bestool could self-update to this release, so
      # fail here rather than publish an un-updatable build.
      - name: Verify signature with the embedded self-update key
        shell: bash
        run: |
          src_dir="target/${{ matrix.target }}/dist"
          name="bestool"
          if [[ ${{ runner.os }} == "Windows" ]]; then
            name="bestool.exe"
          fi
          embedded=$(grep -oE 'RW[A-Za-z0-9+/=]{40,}' crates/bestool/src/download.rs | head -n1)
          if [[ -z "$embedded" ]]; then
            echo "could not extract RELEASE_PUBLIC_KEY from crates/bestool/src/download.rs" >&2
            exit 1
          fi
          echo "verifying against embedded key: $embedded"
          rsign verify "$src_dir/$name.tar.zst" \
            -P "$embedded" \
            -x "$src_dir/$name.tar.zst.minisig"

      - uses: actions/upload-artifact@v7
        with:
          name: bestool-${{ matrix.target }}-${{ github.sha }}
          if-no-files-found: error
          retention-days: 7
          path: |
            target/*/dist/bestool
            target/*/dist/bestool.exe
            target/*/dist/bestool.tar.zst
            target/*/dist/bestool.exe.tar.zst
            *.deb

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-region: ap-southeast-2
          role-to-assume: arn:aws:iam::143295493206:role/gha-tamanu-tools-upload
          role-session-name: GHA@bestool=Build

      - name: Upload versioned to S3
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          src="target/${{ matrix.target }}/dist/bestool"
          dest="s3://bes-ops-tools/bestool/${version}/${{ matrix.target }}/"
          if [[ ${{ runner.os }} == "Windows" ]]; then
            src="$src.exe"
          fi
          aws s3 cp "$src" "$dest" --no-progress
          aws s3 cp "$src.tar.zst" "$dest" --no-progress
          aws s3 cp "$src.tar.zst.minisig" "$dest" --no-progress

          if [[ -n "${{ matrix.gnutarget }}" ]]; then
            gnudest="s3://bes-ops-tools/bestool/${version}/${{ matrix.gnutarget }}/"
            aws s3 cp "$src" "$gnudest" --no-progress
            aws s3 cp "$src.tar.zst" "$gnudest" --no-progress
            aws s3 cp "$src.tar.zst.minisig" "$gnudest" --no-progress
          fi

          for deb in bestool-*.deb; do
            [[ -f "$deb" ]] || continue
            aws s3 cp "$deb" "s3://bes-ops-tools/bestool/${version}/" --no-progress
          done

          aws cloudfront create-invalidation --distribution-id=EDAG0UBS1MN74 --paths "/bestool/${version}/*"

      - name: Upload latest to S3
        shell: bash
        run: |
          src="target/${{ matrix.target }}/dist/bestool"
          dest="s3://bes-ops-tools/bestool/latest/${{ matrix.target }}/"
          if [[ ${{ runner.os }} == "Windows" ]]; then
            src="$src.exe"
          fi
          aws s3 cp "$src" "$dest" --no-progress
          aws s3 cp "$src.tar.zst" "$dest" --no-progress
          aws s3 cp "$src.tar.zst.minisig" "$dest" --no-progress

          if [[ -n "${{ matrix.gnutarget }}" ]]; then
            gnudest="s3://bes-ops-tools/bestool/latest/${{ matrix.gnutarget }}/"
            aws s3 cp "$src" "$gnudest" --no-progress
            aws s3 cp "$src.tar.zst" "$gnudest" --no-progress
            aws s3 cp "$src.tar.zst.minisig" "$gnudest" --no-progress
          fi

          aws cloudfront create-invalidation --distribution-id=EDAG0UBS1MN74 --paths '/bestool/latest/*'

      - name: Upload version file
        if: matrix.target == 'x86_64-pc-windows-msvc'
        # Windows is the main user of the latest-version.txt,
        # Linux generally just uses the APT repo.
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          echo -n "$version" > latest-version.txt
          aws s3 cp latest-version.txt s3://bes-ops-tools/bestool/latest-version.txt --no-progress
          MSYS_NO_PATHCONV=1 aws cloudfront create-invalidation --distribution-id=EDAG0UBS1MN74 --paths '/bestool/latest-version.txt'

      - name: Upload for GHA
        shell: bash
        run: |
          src="target/${{ matrix.target }}/dist/bestool"
          dest="s3://bes-ops-tools/bestool/gha"
          if [[ ${{ matrix.target }} == "x86_64-unknown-linux-musl" ]]; then
            dest="$dest/Linux-X64"
          elif [[ ${{ matrix.target }} == "x86_64-apple-darwin" ]]; then
            dest="$dest/macOS-X64"
          elif [[ ${{ matrix.target }} == "x86_64-pc-windows-msvc" ]]; then
            src="$src.exe"
            dest="$dest/Windows-X64"
          elif [[ ${{ matrix.target }} == "aarch64-apple-darwin" ]]; then
            dest="$dest/macOS-ARM64"
          elif [[ ${{ matrix.target }} == "aarch64-unknown-linux-musl" ]]; then
            dest="$dest/Linux-ARM64"
          else
            exit 0
          fi
          aws s3 cp "$src" "$dest" --no-progress
          aws cloudfront create-invalidation --distribution-id=EDAG0UBS1MN74 --paths '/bestool/gha/*'
