name: Release-plz

on:
  push:
    branches:
      - main
  pull_request:
    types: [labeled]

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz-release:
    if: github.event_name == 'push'
    name: Publish to crates.io
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Configure toolchain
        run: |
          rustup toolchain install --profile minimal --no-self-update stable
          rustup default stable
      - id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@v1.0.5
      - name: Refresh canopy OpenAPI snapshot for packaging
        # Ship a current schema in the published bestool-canopy crate, so its
        # offline / docs.rs consumers (which can't fetch live) don't get a stale
        # committed snapshot. Written but not committed; publish_allow_dirty in
        # release-plz.toml lets it be packaged. Keep the URL in step with
        # SPEC_URL in crates/canopy/build.rs. Non-fatal: on a fetch blip the
        # committed snapshot is published instead.
        run: |
          if curl -fsS --max-time 30 https://meta.tamanu.app/api/openapi.json -o /tmp/canopy-openapi.json; then
            mv /tmp/canopy-openapi.json crates/canopy/openapi.snapshot.json
          else
            echo "::warning::canopy OpenAPI refresh failed; publishing the committed snapshot"
          fi
      - uses: MarcoIeni/release-plz-action@v0.5.130
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}

  release-plz-pr:
    if: github.event_name == 'push'
    name: Open or update release PR
    needs: [release-plz-release]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Configure toolchain
        run: |
          rustup toolchain install --profile minimal --no-self-update stable
          rustup default stable
      - id: release-plz-pr
        uses: MarcoIeni/release-plz-action@v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge on release PR
        if: env.HAS_TOKEN == 'true' && steps.release-plz-pr.outputs.pr != ''
        env:
          HAS_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN != '' }}
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          PR_JSON: ${{ steps.release-plz-pr.outputs.pr }}
        run: |
          pr_number=$(printf '%s' "$PR_JSON" | jq -r '.number // empty')
          if [ -z "$pr_number" ]; then
            exit 0
          fi
          if gh pr view "$pr_number" --json labels --jq '.labels[].name' | grep -qx release-hold; then
            echo "release-hold label present on PR #$pr_number; skipping auto-merge"
          else
            gh pr merge --auto --squash "$pr_number"
          fi

  release-plz-hold:
    if: >-
      github.event_name == 'pull_request'
      && github.event.action == 'labeled'
      && github.event.label.name == 'release-hold'
      && startsWith(github.event.pull_request.head.ref, 'release-plz/')
    name: Disable auto-merge when release-hold is applied
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - name: Disable auto-merge
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --disable-auto "$PR_URL" || true
