version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
      include: scope
    cooldown:
      default-days: 14
    groups:
      actions-patches:
        update-types:
          - patch
          - minor

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      deps-patches:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
      turso:
        patterns:
          - "turso"
          - "turso_*"
        update-types:
          - patch
          - minor
          - major
