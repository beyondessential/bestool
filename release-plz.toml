[workspace]
pr_name = "repo: release"
pr_branch_prefix = "release-plz/"
pr_labels = ["autorelease"]
# Generate changelogs so the release PR body lists the changes, but keep them
# out of the repo: CHANGELOG.md is gitignored, so release-plz writes it to
# populate the PR body without committing it. GitHub release notes are derived
# from the committed file, so they stay empty by design.
changelog_update = true
git_tag_name = "{{ package }}-v{{ version }}"

[[package]]
name = "bestool"
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"
semver_check = false

[[package]]
name = "bestool-canopy"
# The release job refreshes openapi.snapshot.json from live canopy just before
# publishing (see .github/workflows/release-plz.yml), so the published crate
# carries a current schema for offline / docs.rs consumers. That leaves the file
# modified but uncommitted, so let cargo publish it anyway.
publish_allow_dirty = true
